<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <!-- subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- initials badge -->
  <rect x="80" y="200" width="120" height="120" rx="24" fill="rgba(255,255,255,0.15)"/>
  <text x="140" y="279" font-family="Arial Black, Arial, sans-serif" font-size="52"
        font-weight="900" text-anchor="middle" fill="white">MO</text>

  <!-- name -->
  <text x="230" y="252" font-family="Arial, sans-serif" font-size="52"
        font-weight="700" fill="white">Mukharbek Organokov</text>

  <!-- title -->
  <text x="232" y="302" font-family="Arial, sans-serif" font-size="28"
        fill="rgba(255,255,255,0.85)">Senior AI Stack Engineer</text>

  <!-- divider -->
  <rect x="80" y="340" width="560" height="3" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- tags -->
  <rect x="80" y="365" width="130" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
  <text x="145" y="389" font-family="Arial, sans-serif" font-size="16"
        text-anchor="middle" fill="white">MLOps</text>

  <rect x="224" y="365" width="130" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
  <text x="289" y="389" font-family="Arial, sans-serif" font-size="16"
        text-anchor="middle" fill="white">LLMs</text>

  <rect x="368" y="365" width="170" height="38" rx="19" fill="rgba(255,255,255,0.15)"/>
  <text x="453" y="389" font-family="Arial, sans-serif" font-size="16"
        text-anchor="middle" fill="white">Distributed AI</text>

  <!-- url -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="22"
        fill="rgba(255,255,255,0.6)">organokov.com</text>
</svg>
