name: Sync deployment branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0          # need full history to push

      - name: Fast-forward deployment to main
        run: |
          git push origin HEAD:deployment --force
